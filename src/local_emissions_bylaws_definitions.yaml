- location: "Burns Lake"
  text: |
    Burns Lake bylaw 871 restricts the use of wood burning appliances during air quality advisories:
    - **6a**: No person shall use a Wood Burning Appliance at any time when an air quality advisory is in effect, except to heat the premises that are equipped with no heating appliance or facilities other than the Wood Burning Appliance.
    - Contact the Burns Lake municipal office at [250-692-7587](tel:2506927587) for more information on woodstove restrictions.
- location: "Duncan"
  text: |
    Comply with the requirements of local woodstove bylaws that apply to periods when air quality advisories are in effect (e.g., City of Duncan and Municipality of North Cowichan).
- location: "Houston"
  text: |
    Houston bylaw 947 restricts the use of wood burning appliances and open burning during air quality advisories:
    - **2.1.1**: No person shall use a wood burning appliance at any time when an air quality advisory is in effect, except to heat premises that are equipped with no heating appliance or facilities other than the wood burning appliance.
    - **3.2**: No person shall conduct open burning or ignite or maintain any recreational fire if an air quality advisory has been issued.
    - **3.3**: If an air quality advisory is issued while a person is conducting open burning or maintaining a recreational fire, that person shall take all reasonable steps to cease the open burning or extinguish the recreational fire as soon as possible.
    - Contact the Houston municipal office at [250-845-2238](tel:2508452238) for more information on woodstove and open burning restrictions.
- location: "Prince George"
  text: |
    The City of Prince George's Clean Air Bylaw prohibits all open burning, including backyard burning, and land clearing burning.
    During air quality advisories, this bylaw also prohibits recreational fires, use of wood-burning appliances (except for sole wood-burning heat users), and street sweeping activities (unless approved by an Authorized Person).
- location: "Smithers"
  text: |
    Smithers bylaw 1520 restricts the use of wood burning appliances during air quality advisories:
    - **6a**: No person shall use a wood-burning appliance at any time when an air quality advisory is in effect, except to heat premises that are equipped with no heating appliance or facilities other than the wood burning appliance.
    - Contact the Smithers municipal office at [250-847-1600](tel:2508471600) for more information on woodstove restrictions.
- location: "Valemount"
  text: |
    Valemount Bylaw No. 838 restricts the use of wood burning appliances during air quality advisories:
    - **5.1**: A person will not use a wood-burning appliance at any time when an air quality advisory is in effect, except to heat premises that are equipped with no heating source other than the wood burning appliance.
    - Contact the Valemount municipal office at [250-566-4435](tel:2505664435) or visit [https://valemount.ca](https://valemount.ca) for more information on wood stove restrictions.
